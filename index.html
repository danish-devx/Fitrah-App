<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fitrah 2026 - Ramadan 1447</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container py-5">


        <div class="text-center mb-5">
            <h1 class="fw-bold main-title">
                <i class="fa-solid fa-moon"></i> FITRAH 2026
            </h1>
            <p class="sub-title">Ramadan 1447</p>
        </div>


        <div class="card main-card p-4" id="main-container">


            <div class="row text-center fw-bold mb-3 header-row">
                <div class="col-md-3">Commodity</div>
                <div class="col-md-3">Per Person (PKR)</div>
                <div class="col-md-3">Persons</div>
                <div class="col-md-3">Amount (PKR)</div>
            </div>



            <div class="row align-items-center text-center mb-3 ">
                <div class="col-md-3 commodity">
                    <i class="fa-solid fa-wheat-awn"></i>
                    گندم (Wheat)
                </div>
                <div class="col-md-3">
                    <input type="number" value="300" class="form-control neumorph-input" id="amountWheat">
                </div>
                <div class="col-md-3">
                    <input type="number" value="0" class="form-control neumorph-input" id="personsWheat">
                </div>
                <div class="col-md-3">
                    <span class="total" id="totalWheat">0 PKR</span>
                </div>
            </div>



            <div class="row align-items-center text-center mb-3 ">
                <div class="col-md-3 commodity">
                    <i class="fa-solid fa-seedling"></i>
                    جو (Barley)
                </div>
                <div class="col-md-3">
                    <input type="number" value="1100" class="form-control neumorph-input" id="amountBarley">
                </div>
                <div class="col-md-3">
                    <input type="number" value="0" class="form-control neumorph-input" id="personsBarley">
                </div>
                <div class="col-md-3">
                    <span class="total" id="totalBarley">0 PKR</span>
                </div>
            </div>



            <div class="row align-items-center text-center mb-3 ">
                <div class="col-md-3 commodity">
                    <i class="fa-solid fa-apple-whole"></i>
                    کھجور (Dates)
                </div>
                <div class="col-md-3">
                    <input type="number" value="2600" class="form-control neumorph-input" id="amountDates">
                </div>
                <div class="col-md-3">
                    <input type="number" value="0" class="form-control neumorph-input" id="personsDates">
                </div>
                <div class="col-md-3">
                    <span class="total" id="totalDates">0 PKR</span>
                </div>
            </div>



            <div class="row align-items-center text-center mb-3 ">
                <div class="col-md-3 commodity">
                    <i class="fa-solid fa-leaf"></i>
                    عجوہ (Ajwa)
                </div>
                <div class="col-md-3">
                    <input type="number" value="19200" class="form-control neumorph-input" id="amountAjwa">
                </div>
                <div class="col-md-3">
                    <input type="number" value="0" class="form-control neumorph-input" id="personsAjwa">
                </div>
                <div class="col-md-3">
                    <span class="total" id="totalAjwa">0 PKR</span>
                </div>
            </div>



            <div class="row align-items-center text-center mb-4 ">
                <div class="col-md-3 commodity">
                    <i class="fa-solid fa-plant-wilt"></i>
                    کِشمِش (Raisin)
                </div>
                <div class="col-md-3">
                    <input type="number" value="7200" class="form-control neumorph-input" id="amountRaisin">
                </div>
                <div class="col-md-3">
                    <input type="number" value="0" class="form-control neumorph-input" id="personsRaisin">
                </div>
                <div class="col-md-3">
                    <span class="total" id="totalRaisin">0 PKR</span>
                </div>
            </div>

            <hr>



            <div class="text-center mt-4">
                <h4 class="grand-total">
                    <i class="fa-solid fa-calculator"></i>
                    Total Amount: <span id="grandTotal">0</span> PKR
                </h4>
            </div>

        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <script src="app.js"></script>
</body>

</html>
